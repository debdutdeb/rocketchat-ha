# yaml-language-server: $schema=https://raw.githubusercontent.com/k3d-io/k3d/main/pkg/config/v1alpha5/schema.json
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: cluster

image: rancher/k3s:v1.27.4-k3s1
servers: 1
agents: 2
network: registry-proxy-net

ports:
  - port: 8001:80
    nodeFilters:
      - loadbalancer
  - port: 8002:443
    nodeFilters:
      - loadbalancer
#

## NOTE: Uncomment for linux
# volumes:
#   - volume: /sys/fs/bpf:/sys/fs/bpf
#     nodeFilters:
#       - all

options:
  k3s:
    extraArgs:
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
      # - arg: --disable=traefik
      #   nodeFilters:
      #     - server:*
      - arg: --flannel-backend=none
        nodeFilters:
          - server:*
      - arg: --disable-network-policy
        nodeFilters:
          - server:*
  k3d: {}
    #disableLoadbalancer: true
  kubeconfig:
    updateDefaultKubeconfig: false

volumes:
  - volume: ${PWD}/cluster/traefik-config.yaml:/var/lib/rancher/k3s/server/manifests/traefik-config.yaml
    nodeFilters:
      - server:0
