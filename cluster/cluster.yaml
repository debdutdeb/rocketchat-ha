# yaml-language-server: $schema=https://raw.githubusercontent.com/k3d-io/k3d/main/pkg/config/v1alpha5/schema.json
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: cluster

image: rancher/k3s:v1.27.4-k3s1
servers: 1
agents: 1
network: registry-proxy-net

# ports:
#   - port: 8001:80
#     nodeFilters:
#       - loadbalancer
#   - port: 8002:443
#     nodeFilters:
#       - loadbalancer
#       

## NOTE: Uncomment for linux
# volumes:
#   - volume: /sys/fs/bpf:/sys/fs/bpf
#     nodeFilters:
#       - all

options:
  k3s:
    extraArgs:
      - arg: --disable=servicelb
        nodeFilters:
          - server:*
      #     ^ klipper for cilium mesh apiserver
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --flannel-backend=none 
        nodeFilters:
          - server:*
      - arg: --disable-network-policy
        nodeFilters:
          - server:*
  k3d:
    wait: false # no cni initially
    disableLoadbalancer: true # for klipper for cilium mesh apiserver
  kubeconfig:
    updateDefaultKubeconfig: false

registries:
  config: |
    mirrors:
      "docker.io":
        endpoint:
          - "http://proxy-dockerhub:5000"
      "quay.io":
        endpoint:
          - "http://proxy-quay:5000"
      "ghcr.io":
        endpoint:
          - "http://proxy-ghcr:5000"
      "*":
        endpoint:
          - "http://proxy-dockerhub:5000"