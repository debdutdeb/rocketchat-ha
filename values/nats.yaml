config:
  cluster:
    enabled: true
    replicas: 3
    noAdvertise: false

  merge:
    cluster:
      name: nats-ha
      routes:
        - nats://nats-mesh.nats.svc.cluster.local:6222

    system_account: SYS
    no_auth_user: anonymous
    accounts:
      SYS:
        users:
          - user: admin
            password: adminpassword
      DEFAULT:
        users:
          - user: anonymous

