apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../cluster
  
patches:
  - target:
      kind: Simple
      name: cluster
    patch: |-
      - op: add
        path: /metadata/name
        value: cluster1
      - op: add
        path: /options/k3s/extraArgs/-
        value:
          arg: --cluster-cidr=10.100.32.0/19
          nodeFilters:
            - server:*
      - op: add
        path: /options/k3s/extraArgs/-
        value:
          arg: --service-cidr=10.100.64.0/19
          nodeFilters:
            - server:*
