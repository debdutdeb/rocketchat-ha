apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../cluster
  
patches:
  - target:
      kind: Simple
      name: cluster
    patch: |-
      - op: replace
        path: /ports/0/port
        value: 8003:80
      - op: replace
        path: /ports/1/port
        value: 8004:443
      - op: add
        path: /metadata/name
        value: cluster2
      - op: add
        path: /options/k3s/extraArgs/-
        value:
           arg: --cluster-cidr=10.200.32.0/19
           nodeFilters:
             - server:*
      - op: add
        path: /options/k3s/extraArgs/-
        value:
          arg: --service-cidr=10.200.64.0/19
          nodeFilters:
            - server:*
